name: Release

env:
  PUBLIC_RELEASE_OWNER: Leejaywell
  PUBLIC_RELEASE_REPO: streamix
  PUBLIC_RELEASE_COMMITISH: main

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Step 1: 创建草稿 Release，获取 release_id ───────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/github-script@v8
        id: create
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        with:
          github-token: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          script: |
            const tag = process.env.RELEASE_TAG;
            const owner = process.env.PUBLIC_RELEASE_OWNER;
            const repo = process.env.PUBLIC_RELEASE_REPO;

            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag
              });
              return data.id;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            const { data } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: tag,
              target_commitish: process.env.PUBLIC_RELEASE_COMMITISH,
              body: 'Public release assets for Streamix.',
              draft: true,
              prerelease: false
            });
            return data.id;

  # ── Step 2: macOS ARM 与 Windows 并行构建 ─────────────────────────────────
  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - name: macos-arm64
            platform: macos-latest
            rust_targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
            sherpa_archive_suffix: osx-arm64-static-lib

          # Windows x86_64
          - name: windows-x64
            platform: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
            sherpa_archive_suffix: win-x64-shared-MD-Release-lib

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    env:
      NODE_OPTIONS: --no-deprecation
      CMAKE_POLICY_VERSION_MINIMUM: '3.5'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src-tauri/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-${{ matrix.rust_targets }}

      - name: Download sherpa-onnx archive
        shell: bash
        env:
          SHERPA_ARCHIVE_SUFFIX: ${{ matrix.sherpa_archive_suffix }}
        run: |
          set -euo pipefail

          version="$(awk '
            $0 == "[[package]]" { in_package = 1; found = 0; next }
            in_package && $1 == "name" && $3 == "\"sherpa-onnx-sys\"" { found = 1; next }
            in_package && found && $1 == "version" { gsub(/"/, "", $3); print $3; exit }
          ' Cargo.lock
          )"

          if [ -z "${version}" ]; then
            echo "sherpa-onnx-sys not found in Cargo.lock" >&2
            exit 1
          fi

          archive="sherpa-onnx-v${version}-${SHERPA_ARCHIVE_SUFFIX}.tar.bz2"
          mkdir -p .sherpa-onnx-cache

          if [ ! -f ".sherpa-onnx-cache/${archive}" ]; then
            curl --fail --location --retry 3 --retry-delay 5 \
              --output ".sherpa-onnx-cache/${archive}" \
              "https://github.com/k2-fsa/sherpa-onnx/releases/download/v${version}/${archive}"
          fi

      - name: Install frontend deps
        working-directory: src-tauri
        run: npm ci

      - name: Normalize frontend build script on Windows
        if: runner.os == 'Windows'
        working-directory: src-tauri
        run: npm pkg set scripts.build="vite build"

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SHERPA_ONNX_ARCHIVE_DIR: ${{ github.workspace }}/.sherpa-onnx-cache
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          owner: ${{ env.PUBLIC_RELEASE_OWNER }}
          repo: ${{ env.PUBLIC_RELEASE_REPO }}
          releaseCommitish: ${{ env.PUBLIC_RELEASE_COMMITISH }}
          releaseDraft: true
          includeUpdaterJson: true
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
          retryAttempts: 2

  # ── Step 3: 所有平台构建完成后发布 Release ──────────────────────────────────
  publish:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          script: |
            await github.rest.repos.updateRelease({
              owner: process.env.PUBLIC_RELEASE_OWNER,
              repo: process.env.PUBLIC_RELEASE_REPO,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });
