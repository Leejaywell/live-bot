name: Release

env:
  PUBLIC_RELEASE_OWNER: Leejaywell
  PUBLIC_RELEASE_REPO: streamix
  PUBLIC_RELEASE_COMMITISH: main

on:
  push:
    tags:
      - 'v*'

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Step 1: 创建草稿 Release，获取 release_id ───────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v6

      - name: Guard public release repository
        uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          script: |
            const owner = process.env.PUBLIC_RELEASE_OWNER;
            const repo = process.env.PUBLIC_RELEASE_REPO;
            const branch = process.env.PUBLIC_RELEASE_COMMITISH;

            const { data: ref } = await github.rest.git.getRef({
              owner,
              repo,
              ref: `heads/${branch}`
            });
            const { data: tree } = await github.rest.git.getTree({
              owner,
              repo,
              tree_sha: ref.object.sha,
              recursive: 'true'
            });

            const privateSourcePatterns = [
              /^Cargo\.toml$/,
              /^Cargo\.lock$/,
              /^src\//,
              /^src-tauri\//,
              /^crates\//,
              /^capabilities\//,
              /^tauri\.conf\.json$/,
              /^package\.json$/,
              /^package-lock\.json$/,
              /^pnpm-lock\.yaml$/,
              /^vite\.config\./,
              /^build\.rs$/
            ];

            const matches = tree.tree
              .map(item => item.path)
              .filter(path => privateSourcePatterns.some(pattern => pattern.test(path)));

            if (matches.length > 0) {
              core.setFailed(
                `Public release repository ${owner}/${repo} contains source paths: ${matches.join(', ')}`
              );
            }

      - uses: actions/github-script@v8
        id: create
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        with:
          github-token: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          script: |
            const tag = process.env.RELEASE_TAG;
            const owner = process.env.PUBLIC_RELEASE_OWNER;
            const repo = process.env.PUBLIC_RELEASE_REPO;

            try {
              const { data } = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag
              });
              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: data.id
              });
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            try {
              await github.rest.git.deleteRef({
                owner,
                repo,
                ref: `tags/${tag}`
              });
            } catch (error) {
              const missingRef = error.status === 404 ||
                (error.status === 422 && error.message === 'Reference does not exist');
              if (!missingRef) {
                throw error;
              }
            }

            const { data } = await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: tag,
              name: tag,
              target_commitish: process.env.PUBLIC_RELEASE_COMMITISH,
              body: 'Public release assets for Streamix. GitHub source archives are generated from this public release repository only.',
              draft: true,
              prerelease: false
            });
            return data.id;

  # ── Step 2: macOS ARM 与 Windows 并行构建 ─────────────────────────────────
  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - name: macos-arm64
            platform: macos-latest
            rust_targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin --bundles app,dmg
            sherpa_archive_suffix: osx-arm64-static-lib
            sherpa_env_mode: archive

          # Windows x86_64
          - name: windows-x64
            platform: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc --bundles nsis
            sherpa_archive_suffix: win-x64-shared-MD-Release-lib
            sherpa_env_mode: libdir

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    env:
      NODE_OPTIONS: --no-deprecation
      CMAKE_POLICY_VERSION_MINIMUM: '3.5'
      RUSTC_WRAPPER: sccache
      SCCACHE_GHA_ENABLED: 'true'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src-tauri/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-${{ matrix.rust_targets }}

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Cache sherpa-onnx archive
        uses: actions/cache@v4
        with:
          path: .sherpa-onnx-cache
          key: sherpa-onnx-${{ matrix.platform }}-${{ matrix.sherpa_archive_suffix }}-${{ hashFiles('Cargo.lock') }}

      - name: Download sherpa-onnx archive
        shell: bash
        env:
          SHERPA_ARCHIVE_SUFFIX: ${{ matrix.sherpa_archive_suffix }}
        run: |
          set -euo pipefail

          version="$(awk '
            $0 == "[[package]]" { in_package = 1; found = 0; next }
            in_package && $1 == "name" && $3 == "\"sherpa-onnx-sys\"" { found = 1; next }
            in_package && found && $1 == "version" { gsub(/"/, "", $3); print $3; exit }
          ' Cargo.lock
          )"

          if [ -z "${version}" ]; then
            echo "sherpa-onnx-sys not found in Cargo.lock" >&2
            exit 1
          fi

          archive="sherpa-onnx-v${version}-${SHERPA_ARCHIVE_SUFFIX}.tar.bz2"
          mkdir -p .sherpa-onnx-cache

          if [ ! -f ".sherpa-onnx-cache/${archive}" ]; then
            curl --fail --location --retry 3 --retry-delay 5 \
              --output ".sherpa-onnx-cache/${archive}" \
              "https://github.com/k2-fsa/sherpa-onnx/releases/download/v${version}/${archive}"
          fi

      - name: Install frontend deps
        working-directory: src-tauri
        run: npm ci

      - name: Prepare sherpa-onnx lib dir for Windows
        if: matrix.sherpa_env_mode == 'libdir'
        shell: bash
        env:
          SHERPA_ARCHIVE_SUFFIX: ${{ matrix.sherpa_archive_suffix }}
        run: |
          set -euo pipefail

          version="$(awk '
            $0 == "[[package]]" { in_package = 1; found = 0; next }
            in_package && $1 == "name" && $3 == "\"sherpa-onnx-sys\"" { found = 1; next }
            in_package && found && $1 == "version" { gsub(/"/, "", $3); print $3; exit }
          ' Cargo.lock
          )"

          archive="sherpa-onnx-v${version}-${SHERPA_ARCHIVE_SUFFIX}.tar.bz2"
          extract_root=".sherpa-onnx-cache/extracted"
          rm -rf "${extract_root}"
          mkdir -p "${extract_root}"
          tar -xjf ".sherpa-onnx-cache/${archive}" -C "${extract_root}"

          lib_dir="$(find "${extract_root}" -type d -path '*/lib' | head -n 1)"
          if [ -z "${lib_dir}" ]; then
            echo "Unable to locate sherpa-onnx lib directory after extracting ${archive}" >&2
            exit 1
          fi

          echo "SHERPA_ONNX_LIB_DIR=${GITHUB_WORKSPACE}/${lib_dir}" >> "${GITHUB_ENV}"

      - name: Stage Windows runtime DLLs for bundling
        if: runner.os == 'Windows'
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${SHERPA_ONNX_LIB_DIR:-}" ]; then
            echo "SHERPA_ONNX_LIB_DIR is not set" >&2
            exit 1
          fi

          runtime_dir="src-tauri/runtime-libs"
          rm -rf "${runtime_dir}"
          mkdir -p "${runtime_dir}"
          cp "${SHERPA_ONNX_LIB_DIR}"/*.dll "${runtime_dir}/"

      - name: Build and upload (non-Windows)
        if: runner.os != 'Windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SHERPA_ONNX_ARCHIVE_DIR: ${{ github.workspace }}/.sherpa-onnx-cache
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          owner: ${{ env.PUBLIC_RELEASE_OWNER }}
          repo: ${{ env.PUBLIC_RELEASE_REPO }}
          releaseCommitish: ${{ env.PUBLIC_RELEASE_COMMITISH }}
          releaseDraft: true
          includeUpdaterJson: true
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
          retryAttempts: 2

      - name: Build and upload (Windows)
        if: runner.os == 'Windows'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          SHERPA_ONNX_ARCHIVE_DIR: ${{ github.workspace }}/.sherpa-onnx-cache
          SHERPA_ONNX_LIB_DIR: ${{ env.SHERPA_ONNX_LIB_DIR }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          owner: ${{ env.PUBLIC_RELEASE_OWNER }}
          repo: ${{ env.PUBLIC_RELEASE_REPO }}
          releaseCommitish: ${{ env.PUBLIC_RELEASE_COMMITISH }}
          releaseDraft: true
          includeUpdaterJson: true
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
          retryAttempts: 2

  # ── Step 3: 所有平台构建完成后发布 Release ──────────────────────────────────
  publish:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v8
        with:
          github-token: ${{ secrets.PUBLIC_RELEASES_TOKEN }}
          script: |
            await github.rest.repos.updateRelease({
              owner: process.env.PUBLIC_RELEASE_OWNER,
              repo: process.env.PUBLIC_RELEASE_REPO,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });
