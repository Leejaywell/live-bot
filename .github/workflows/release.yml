name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ── Step 1: 创建草稿 Release，获取 release_id ───────────────────────────────
  create-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      release_id: ${{ steps.create.outputs.result }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/github-script@v8
        id: create
        with:
          script: |
            const tag = context.ref.replace('refs/tags/', '');
            const { data } = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              body: '## 更新内容\n\n请查看 [CHANGELOG](https://github.com/Leejaywell/live-bot/blob/master/CHANGELOG.md)',
              draft: true,
              prerelease: false
            });
            return data.id;

  # ── Step 2: macOS ARM 与 Windows 并行构建 ─────────────────────────────────
  build:
    needs: create-release
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon
          - name: macos-arm64
            platform: macos-latest
            rust_targets: aarch64-apple-darwin
            args: --target aarch64-apple-darwin

          # Windows x86_64
          - name: windows-x64
            platform: windows-latest
            rust_targets: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc

    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    env:
      NODE_OPTIONS: --no-deprecation
      CMAKE_POLICY_VERSION_MINIMUM: '3.5'

    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: src-tauri/package-lock.json

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-${{ matrix.rust_targets }}

      - name: Install frontend deps
        working-directory: src-tauri
        run: npm ci

      - name: Normalize frontend build script on Windows
        if: runner.os == 'Windows'
        working-directory: src-tauri
        run: npm pkg set scripts.build="vite build"

      - name: Build and upload
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          releaseId: ${{ needs.create-release.outputs.release_id }}
          tagName: ${{ github.ref_name }}
          releaseDraft: true
          includeUpdaterJson: true
          args: ${{ matrix.args }}
          updaterJsonPreferNsis: true
          retryAttempts: 2

  # ── Step 3: 所有平台构建完成后发布 Release ──────────────────────────────────
  publish:
    needs: [create-release, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: ${{ needs.create-release.outputs.release_id }},
              draft: false
            });
