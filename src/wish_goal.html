<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:transparent;font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif}
body{display:flex;align-items:center;justify-content:center}
#card{min-width:260px;max-width:460px;padding:10px;border:2px solid var(--accent,#22d3ee);border-radius:12px;background:var(--bg,rgba(30,34,40,.72));box-shadow:0 14px 36px rgba(0,0,0,.18);backdrop-filter:blur(8px)}
#title{margin-bottom:8px;padding:4px 10px;border:1px solid color-mix(in srgb,var(--accent,#22d3ee),white 35%);border-radius:8px;background:rgba(255,255,255,.58);color:var(--text,#111827);font-weight:900;text-align:center}
#items{display:flex;flex-direction:column;gap:6px}
.goal{padding:7px 8px;border:1px solid color-mix(in srgb,var(--accent,#22d3ee),white 25%);border-radius:9px;background:rgba(255,255,255,.56);color:var(--text,#111827)}
.line{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.icon{width:30px;height:30px;flex-shrink:0;border-radius:8px;object-fit:contain}
.name{flex:1;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.num{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-weight:900;color:var(--num,#fff);text-shadow:0 1px 2px rgba(0,0,0,.75)}
.bar{height:8px;border-radius:999px;background:rgba(255,255,255,.5);overflow:hidden}
.fill{height:100%;border-radius:inherit;background:var(--accent,#22d3ee);transition:width .25s ease}
@keyframes completePulse{0%,100%{transform:scale(1)}50%{transform:scale(1.035);filter:brightness(1.12)}}
@keyframes completeBounce{0%,100%{transform:translateY(0)}35%{transform:translateY(-8px)}65%{transform:translateY(2px)}}
@keyframes completeSpark{0%{box-shadow:0 0 0 rgba(255,255,255,0)}50%{box-shadow:0 0 0 5px rgba(255,255,255,.28),0 0 28px var(--accent,#22d3ee)}100%{box-shadow:0 0 0 rgba(255,255,255,0)}}
.complete.anim-pulse{animation:completePulse .8s ease}
.complete.anim-bounce{animation:completeBounce .7s ease}
.complete.anim-spark{animation:completeSpark .9s ease}
body.size-small #card{transform:scale(.86)}
body.size-large #card{transform:scale(1.18)}
body.no-icons .icon{display:none}
@keyframes wishShimmer{0%{background-position:0 0}100%{background-position:180% 0}}
@keyframes wishNeon{0%,100%{filter:drop-shadow(0 0 0 rgba(34,211,238,0))}50%{filter:drop-shadow(0 0 8px rgba(34,211,238,.45))}}
@keyframes wishFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-2px)}}
@keyframes wishSlide{0%,100%{transform:translateX(0)}50%{transform:translateX(2px)}}
@keyframes wishStripe{0%{background-position:0 0}100%{background-position:28px 0}}
@keyframes wishGlow{0%,100%{box-shadow:0 8px 20px rgba(15,23,42,.12)}50%{box-shadow:0 12px 28px rgba(15,23,42,.22)}}
body.style-classic .goal{transition:transform .22s ease,box-shadow .22s ease}
body.style-classic .goal:hover{transform:translateY(-1px)}
body.style-classic .bar{height:10px}
body.style-classic .fill{animation:wishShimmer 2.4s linear infinite;background-image:linear-gradient(90deg,var(--accent),color-mix(in srgb,var(--accent),white 36%),var(--accent));background-size:180% 100%}
body.style-classic .num{color:var(--num);text-shadow:0 1px 2px rgba(0,0,0,.72)}
body.style-capsule .goal{border-radius:999px;padding:8px 12px}
body.style-capsule .bar{height:18px}
body.style-capsule .fill{background:linear-gradient(90deg,#93c5fd,#c4b5fd,#f0abfc);animation:wishShimmer 2.2s linear infinite;background-size:180% 100%}
body.style-capsule .num{color:#fff;text-shadow:0 1px 3px rgba(55,48,163,.75)}
body.style-neon #card{background:#20242a;border-color:#22d3ee;box-shadow:0 0 24px rgba(34,211,238,.3)}
body.style-neon #title,body.style-neon .goal{background:rgba(20,24,28,.82);border-color:#22d3ee;color:white}
body.style-neon .goal{animation:wishNeon 2.6s ease-in-out infinite}
body.style-neon .num{color:#fff;text-shadow:0 0 8px rgba(34,211,238,.75),0 1px 2px rgba(0,0,0,.9)}
body.style-circle #card{min-width:150px;background:transparent;border-color:transparent;box-shadow:none;backdrop-filter:none}
body.style-circle #title{display:none}
body.style-circle .goal{border:0;background:transparent;box-shadow:none;text-align:center;animation:wishFloat 2.8s ease-in-out infinite}
body.style-circle .line{flex-direction:column;margin-bottom:4px}
body.style-circle .name{display:none}
body.style-circle .icon{order:0;width:58px;height:58px;border-radius:999px;padding:8px;border:4px solid rgba(255,255,255,.58)}
body.style-circle .num{order:1;font-size:20px;color:var(--num);text-shadow:0 2px 3px rgba(0,0,0,.7)}
body.style-circle .bar{display:none}
body.style-plain #card{background:transparent;border-color:transparent;box-shadow:none;backdrop-filter:none}
body.style-plain #title,body.style-plain .bar{display:none}
body.style-plain .goal{border:0;background:transparent;box-shadow:none;animation:wishFloat 3s ease-in-out infinite}
body.style-plain .name,body.style-plain .num{color:white;text-shadow:0 2px 3px rgba(0,0,0,.55)}
body.style-ribbon #title{border-radius:999px;background:linear-gradient(180deg,#bfdbfe,#60a5fa);color:#fff;text-shadow:0 2px 3px rgba(30,64,175,.58)}
body.style-ribbon .goal{border-radius:14px;border-left-width:5px;animation:wishSlide 2.8s ease-in-out infinite}
body.style-ribbon .bar{height:12px}
body.style-ribbon .fill{background:repeating-linear-gradient(45deg,var(--accent) 0 10px,color-mix(in srgb,var(--accent),white 35%) 10px 20px);animation:wishStripe 1.8s linear infinite}
body.style-glass #card{background:rgba(255,255,255,.26);border-color:rgba(255,255,255,.62);box-shadow:0 18px 42px rgba(15,23,42,.18)}
body.style-glass #title,body.style-glass .goal{background:rgba(255,255,255,.34);border-color:rgba(255,255,255,.7)}
body.style-glass .goal{animation:wishGlow 2.7s ease-in-out infinite}
body.style-glass .num{color:var(--num);text-shadow:0 1px 3px rgba(0,0,0,.68)}
body.style-compact #card{min-width:280px;background:transparent;border-color:transparent;box-shadow:none}
body.style-compact #title,body.style-compact .bar{display:none}
body.style-compact .goal{border:0;background:transparent;box-shadow:none;padding:3px 0;animation:wishFloat 3.2s ease-in-out infinite}
body.style-compact .name,body.style-compact .num{color:#fff;text-shadow:0 2px 3px rgba(0,0,0,.72)}
</style>
<style id="custom-css"></style>
</head>
<body>
<div id="card">
  <div id="title"></div>
  <div id="items"></div>
</div>
<script>
var cfg=null;
var completed={};
var audioCtx=null;
function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function attr(s){return esc(s).replace(/"/g,'&quot;')}
function localResource(path){return '/local-resource?url='+encodeURIComponent(path||'')}
function imgSrc(url){return String(url||'').indexOf('hdslb.com')>-1?'/proxy?url='+encodeURIComponent(url):url}
function fontFamily(name){
  return '"'+String(name||'PingFang SC').replace(/"/g,'')+'","PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif';
}
function playBuiltinSound(kind, volume){
  if(!kind || kind==='mute') return;
  try{
    audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();
    var osc=audioCtx.createOscillator(), gain=audioCtx.createGain();
    var freq=kind==='coin'?880:kind==='success'?660:520;
    osc.frequency.value=freq; osc.type='sine';
    gain.gain.value=Math.max(0,Math.min(1,Number(volume||60)/100))*0.18;
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(); gain.gain.exponentialRampToValueAtTime(0.0001,audioCtx.currentTime+0.28); osc.stop(audioCtx.currentTime+0.3);
  }catch(e){}
}
function playSound(kind, volume){
  if(kind==='custom' && cfg.CustomSoundPath){
    try{
      var audio=new Audio(localResource(cfg.CustomSoundPath));
      audio.volume=Math.max(0,Math.min(1,Number(volume||60)/100));
      audio.onerror=function(){playBuiltinSound('chime',volume)};
      var p=audio.play();
      if(p&&p.catch) p.catch(function(){playBuiltinSound('chime',volume)});
      return;
    }catch(e){playBuiltinSound('chime',volume);return}
  }
  playBuiltinSound(kind,volume);
}
function apply(next){
  cfg=(next&&next.WishGoal)||next||{};
  document.body.className='';
  if(cfg.DisplaySize) document.body.classList.add('size-'+cfg.DisplaySize);
  document.body.classList.add('style-'+(cfg.StylePreset||'classic'));
  if(cfg.ShowIcons===false) document.body.classList.add('no-icons');
  document.getElementById('custom-css').textContent=cfg.StylePreset==='custom'?(cfg.CustomCss||''):'';
  document.body.style.fontFamily=fontFamily(cfg.FontFamily);
  document.documentElement.style.setProperty('--accent',cfg.AccentColor||'#22d3ee');
  document.documentElement.style.setProperty('--bg',cfg.BackgroundColor||'rgba(30,34,40,.72)');
  document.documentElement.style.setProperty('--text',cfg.TextColor||'#111827');
  document.documentElement.style.setProperty('--num',cfg.NumberColor||'#fff');
  document.getElementById('title').textContent=cfg.Title||'今日心愿目标';
  var items=document.getElementById('items');
  items.innerHTML=(cfg.Goals||[]).map(function(g){
    var target=Math.max(1,Number(g.Target||1));
    var current=Math.max(0,Number(g.Current||0));
    var pct=Math.min(100,(current/target)*100);
    var done=current>=target;
    var id=String(g.Id||g.Name||'');
    var cls=done?' goal complete':' goal';
    if(done && (!completed[id] || cfg.SoundRepeat==='always')) {
      setTimeout(function(){playSound(cfg.CompleteSound,cfg.SoundVolume)},0);
    }
    if(done) completed[id]=true; else completed[id]=false;
    var anim=done&&cfg.CompleteAnimation&&cfg.CompleteAnimation!=='none'?' anim-'+cfg.CompleteAnimation:'';
    var icon=/^https?:\/\//.test(g.Icon||'')?'<img class="icon" src="'+attr(imgSrc(g.Icon))+'" alt="">':'';
    return '<div class="'+cls+anim+'"><div class="line">'+icon+'<span class="name">'+esc(g.Name)+'</span><span class="num">'+current+'/'+target+'</span></div><div class="bar"><div class="fill" style="width:'+pct+'%"></div></div></div>';
  }).join('');
}
function load(){fetch('/plugin-settings').then(function(r){return r.json()}).then(apply).catch(function(){})}
load();
var ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws');
ws.onmessage=function(ev){
  try{
    var data=JSON.parse(ev.data);
    if(data._plugin_settings_update) load();
  }catch(e){}
};
</script>
</body>
</html>
