<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>音乐互动</title>
  <style>
    html,body{margin:0;background:transparent;font-family:PingFang SC,Microsoft YaHei,sans-serif;color:#fff}
    .wrap{box-sizing:border-box;width:100vw;height:100vh;padding:12px;display:flex;align-items:center;gap:12px;background:rgba(20,20,26,.72)}
    .cover{width:72px;height:72px;border-radius:8px;background:rgba(255,255,255,.14);flex:0 0 auto}
    .main{min-width:0;flex:1}
    .title{font-size:22px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .meta{margin-top:6px;font-size:13px;color:rgba(255,255,255,.72);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .stats{font-size:12px;color:#c4b5fd;font-weight:800}
    .queue{margin:8px 0 0;padding:0;list-style:none;font-size:12px;color:rgba(255,255,255,.78)}
    .queue li{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .queue li+li{margin-top:3px}
    body.minimal .wrap{height:72px;padding:8px 12px;background:rgba(0,0,0,.35)}
    body.minimal .cover{display:none}
    body.minimal .title{font-size:18px}
    body.minimal .queue{display:none}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="cover"></div>
    <div class="main">
      <div class="stats" id="stats">本场点歌 0 电池</div>
      <div class="title" id="title">今日第一首歌等待点亮</div>
      <div class="meta" id="meta">送礼点歌后将在这里显示</div>
      <ul class="queue" id="queue"></ul>
    </div>
  </div>
  <script>
    const params = new URLSearchParams(location.search);
    document.body.className = params.get('skin') || 'compact';

    const title = document.getElementById('title');
    const meta = document.getElementById('meta');
    const stats = document.getElementById('stats');
    const queue = document.getElementById('queue');
    const view = location.pathname.endsWith('/now-playing')
      ? 'now-playing'
      : location.pathname.endsWith('/rank')
        ? 'rank'
        : 'playlist';

    async function fetchJson(path) {
      const res = await fetch(path, { cache: 'no-store' });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      return res.json();
    }

    function itemText(item) {
      if (!item) return '';
      const artists = item.artistNames ? ` - ${item.artistNames}` : '';
      return `${item.songName || '未命名歌曲'}${artists}`;
    }

    function renderQueue(items) {
      const totalValue = items.reduce((sum, item) => sum + (Number(item.creditValue) || 0), 0);
      stats.textContent = `本场点歌 ${totalValue} 电池`;
      queue.replaceChildren();

      if (!items.length) {
        title.textContent = '今日第一首歌等待点亮';
        meta.textContent = '送礼点歌后将在这里显示';
        return;
      }

      const playing = items.find(item => item.status === 'playing');
      const lead = playing || items[0];
      title.textContent = itemText(lead);
      meta.textContent = `${lead.uname || '观众'} 点播 · ${lead.tier || '普通'} · ${lead.status === 'playing' ? '播放中' : '排队中'}`;

      items.slice(0, 4).forEach((item, index) => {
        const li = document.createElement('li');
        li.textContent = `${index + 1}. ${itemText(item)} · ${item.uname || '观众'}`;
        queue.appendChild(li);
      });
    }

    function renderNowPlaying(item) {
      stats.textContent = item ? `当前播放 · ${item.creditValue || 0} 电池` : '当前播放';
      queue.replaceChildren();

      if (!item) {
        title.textContent = '暂无正在播放';
        meta.textContent = '队列歌曲开始播放后将在这里显示';
        return;
      }

      title.textContent = itemText(item);
      meta.textContent = `${item.uname || '观众'} 点播 · ${item.tier || '普通'}`;
    }

    function renderRank(items) {
      stats.textContent = '点歌排行';
      queue.replaceChildren();
      title.textContent = items.length ? '点歌排行' : '暂无排行数据';
      meta.textContent = items.length ? '排行将在这里显示' : '送礼点歌后将在这里显示';
    }

    async function refresh() {
      try {
        if (view === 'now-playing') {
          const data = await fetchJson('/song-request/api/now-playing');
          renderNowPlaying(data.item || null);
        } else if (view === 'rank') {
          const data = await fetchJson('/song-request/api/rank');
          renderRank(Array.isArray(data.items) ? data.items : []);
        } else {
          const data = await fetchJson('/song-request/api/queue');
          renderQueue(Array.isArray(data.items) ? data.items : []);
        }
      } catch (err) {
        console.warn('music overlay refresh failed', err);
        if (view === 'now-playing') {
          renderNowPlaying(null);
        } else if (view === 'rank') {
          renderRank([]);
        } else {
          renderQueue([]);
        }
      }
    }

    refresh();
    setInterval(refresh, 3000);
  </script>
</body>
</html>
