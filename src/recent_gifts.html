<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:transparent;font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif}
body{display:flex;align-items:center;justify-content:center}
#list{display:flex;flex-direction:column;gap:8px;min-width:230px}
.item{display:flex;align-items:center;gap:9px;min-height:58px;padding:7px 12px;border-left:4px solid #38bdf8;background:linear-gradient(90deg,rgba(0,0,0,.82),rgba(15,23,42,.58));box-shadow:0 8px 20px rgba(0,0,0,.28);animation:slideIn .32s ease both}
.avatar{width:42px;height:42px;border-radius:999px;background:linear-gradient(135deg,#f9a8d4,#fde68a);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:900;overflow:hidden;flex-shrink:0}
.avatar img{width:100%;height:100%;object-fit:cover}
.text{min-width:0;line-height:1.25}
.user{font-size:15px;font-weight:900;color:var(--name,#fff);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 2px rgba(0,0,0,.72)}
.gift{margin-top:3px;font-size:13px;font-weight:800;color:var(--gift,rgba(255,255,255,.72));white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.count{color:var(--num,#fcee21)}
body.skin-glass .item{border:1px solid rgba(255,255,255,.42);border-left:4px solid #a78bfa;border-radius:14px;background:rgba(255,255,255,.22);backdrop-filter:blur(8px)}
@keyframes slideIn{from{opacity:0;transform:translateX(18px)}to{opacity:1;transform:translateX(0)}}
</style>
</head>
<body>
<div id="list"></div>
<script>
function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function imgSrc(url){return String(url||'').indexOf('hdslb.com')>-1?'/proxy?url='+encodeURIComponent(url):url}
function apply(next){
  var cfg=(next&&next.RecentGifts)||next||{};
  document.body.className='skin-'+(cfg.Skin||'compact');
  document.documentElement.style.setProperty('--name',cfg.NameColor||'#fff');
  document.documentElement.style.setProperty('--num',cfg.NumberColor||'#fcee21');
  document.documentElement.style.setProperty('--gift',cfg.GiftColor||'rgba(255,255,255,.72)');
  var items=(cfg.Items||[]).slice(0,Math.max(1,Number(cfg.MaxItems||3)));
  document.getElementById('list').innerHTML=items.map(function(item){
    var avatar=item.Avatar?'<img src="'+esc(imgSrc(item.Avatar))+'" alt="">':esc((item.User||'观').slice(0,1));
    return '<div class="item"><div class="avatar">'+avatar+'</div><div class="text"><div class="user">'+esc(item.User)+'</div><div class="gift">赠送 '+esc(item.Gift)+' <span class="count">x'+Number(item.Count||1)+'</span></div></div></div>';
  }).join('');
}
function load(){fetch('/plugin-settings').then(function(r){return r.json()}).then(apply).catch(function(){})}
load();
var ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws');
ws.onmessage=function(ev){try{var data=JSON.parse(ev.data);if(data._plugin_settings_update)load()}catch(e){}};
</script>
</body>
</html>
