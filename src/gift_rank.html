<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:transparent;font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif}
body{display:flex;align-items:center;justify-content:center}
#rank{display:flex;align-items:flex-end;justify-content:center;gap:2px;min-width:360px;min-height:178px}
.slot{position:relative;display:flex;flex-direction:column;align-items:center;animation:floatIn .48s cubic-bezier(.2,.8,.2,1) both}
.slot:nth-child(1){order:2;transform-origin:center bottom}
.slot:nth-child(2){order:1;animation-delay:.08s}
.slot:nth-child(3){order:3;animation-delay:.16s}
.avatar-wrap{position:relative;width:74px;height:74px;border-radius:999px;background:linear-gradient(135deg,#ffd56f,#ff8a8a);padding:5px;box-shadow:0 10px 24px rgba(0,0,0,.2)}
.slot:nth-child(2) .avatar-wrap,.slot:nth-child(3) .avatar-wrap{width:66px;height:66px}
.avatar{width:100%;height:100%;border-radius:999px;background:linear-gradient(135deg,#fff7ad,#f0abfc);display:flex;align-items:center;justify-content:center;overflow:hidden;color:#8a5c17;font-size:24px;font-weight:900;border:3px solid rgba(255,255,255,.86)}
.avatar img{width:100%;height:100%;object-fit:cover}
.crown{position:absolute;top:-22px;left:50%;transform:translateX(-50%);font-size:23px;filter:drop-shadow(0 2px 2px rgba(0,0,0,.22))}
.seat{width:76px;height:34px;margin-top:-7px;border-radius:11px 11px 14px 14px;background:linear-gradient(180deg,#dff8ff,#b8e4f2);border:2px solid rgba(80,120,140,.18);box-shadow:inset 0 -6px 10px rgba(96,125,139,.2),0 8px 16px rgba(0,0,0,.16)}
.slot:nth-child(1) .seat{height:40px}
.name{max-width:102px;margin-top:7px;padding:5px 14px;border-radius:999px;background:rgba(92,84,74,.82);border:2px solid rgba(255,205,102,.72);color:#fff;font-size:14px;font-weight:900;line-height:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 1px 2px rgba(0,0,0,.55)}
.value{margin-top:4px;color:#ffe58a;font-size:12px;font-weight:900;text-shadow:0 1px 2px rgba(0,0,0,.7)}
body.skin-list #rank{flex-direction:column;align-items:stretch;gap:8px;min-width:300px}
body.skin-list .slot{order:initial!important;min-height:58px;flex-direction:row;gap:10px;padding:8px 12px;border-left:4px solid #fbbf24;background:linear-gradient(90deg,rgba(0,0,0,.78),rgba(30,41,59,.58));box-shadow:0 8px 20px rgba(0,0,0,.24)}
body.skin-list .avatar-wrap,body.skin-list .slot:nth-child(2) .avatar-wrap,body.skin-list .slot:nth-child(3) .avatar-wrap{width:42px;height:42px;padding:2px}
body.skin-list .crown{position:static;transform:none;font-size:16px}
body.skin-list .seat{display:none}
body.skin-list .name{margin:0;max-width:150px;border:0;background:transparent;padding:0;font-size:15px}
body.skin-list .value{margin-left:auto;color:#fef08a;font-size:14px}
@keyframes floatIn{from{opacity:0;transform:translateY(18px) scale(.94)}to{opacity:1;transform:translateY(0) scale(1)}}
</style>
</head>
<body>
<div id="rank"></div>
<script>
function esc(s){return String(s||'').replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function imgSrc(url){return String(url||'').indexOf('hdslb.com')>-1?'/proxy?url='+encodeURIComponent(url):url}
function formatValue(v){v=Number(v||0);if(v>=10000)return (v/10000).toFixed(v>=100000?0:1).replace(/\.0$/,'')+'万';return String(v)}
function apply(next){
  var cfg=(next&&next.GiftRank)||next||{};
  document.body.className='skin-'+(cfg.Skin||'podium');
  var items=(cfg.Items||[]).slice(0,Math.max(1,Number(cfg.MaxItems||3)));
  document.getElementById('rank').innerHTML=items.map(function(item,idx){
    var avatar=item.Avatar?'<img src="'+esc(imgSrc(item.Avatar))+'" alt="">':esc((item.User||'观').slice(0,1));
    return '<div class="slot"><div class="avatar-wrap"><div class="crown">'+(['👑','⭐','⭐'][idx]||'')+'</div><div class="avatar">'+avatar+'</div></div><div class="seat"></div><div class="name">'+esc(item.User)+'</div><div class="value">'+formatValue(item.Value)+'</div></div>';
  }).join('');
}
function load(){fetch('/plugin-settings').then(function(r){return r.json()}).then(apply).catch(function(){})}
load();
var ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws');
ws.onmessage=function(ev){try{var data=JSON.parse(ev.data);if(data._plugin_settings_update)load()}catch(e){}};
</script>
</body>
</html>
