<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:transparent;font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif}
body{display:flex;align-items:center;justify-content:center;color:#fff}
#wrap{min-width:360px;padding:18px;border-radius:24px;background:linear-gradient(180deg,rgba(82,42,166,.92),rgba(38,20,87,.92));border:2px solid rgba(216,180,254,.9);box-shadow:0 22px 60px rgba(40,20,80,.38),inset 0 0 0 1px rgba(255,255,255,.18)}
#title{text-align:center;font-size:24px;font-weight:900;letter-spacing:2px;text-shadow:0 2px 4px rgba(0,0,0,.45)}
#wheel{position:relative;margin:16px auto 14px;width:240px;height:240px;border-radius:999px;background:conic-gradient(#facc15 0 25%,#fb7185 0 50%,#60a5fa 0 75%,#a78bfa 0);border:10px solid #7c3aed;box-shadow:inset 0 0 0 8px rgba(255,255,255,.36),0 10px 28px rgba(0,0,0,.35);transition:transform 1.2s cubic-bezier(.2,.8,.2,1)}
#wheel::after{content:"抽";position:absolute;inset:72px;border-radius:999px;display:flex;align-items:center;justify-content:center;background:#fff;color:#7c3aed;font-size:42px;font-weight:900;box-shadow:0 0 18px rgba(255,255,255,.7)}
#pointer{position:absolute;left:50%;top:-2px;width:0;height:0;transform:translateX(-50%);border-left:16px solid transparent;border-right:16px solid transparent;border-top:32px solid #fff}
#result{min-height:58px;padding:10px 14px;border-radius:14px;background:rgba(20,12,42,.72);border:1px solid rgba(255,255,255,.22);text-align:center;font-weight:800;box-shadow:inset 0 0 0 1px rgba(255,255,255,.08)}
#winner{font-size:14px;color:#ddd6fe}
#prize{margin-top:4px;font-size:24px;color:#fde68a;text-shadow:0 2px 5px rgba(0,0,0,.55)}
#empty{font-size:14px;color:rgba(255,255,255,.72)}
.hide{display:none}
</style>
</head>
<body>
<div id="wrap">
  <div id="title">幸运抽奖</div>
  <div id="wheel"><div id="pointer"></div></div>
  <div id="result"><div id="empty">等待抽奖触发</div><div id="winner" class="hide"></div><div id="prize" class="hide"></div></div>
</div>
<script>
var lastNonce=0, hideTimer=null;
function apply(next){
  var cfg=(next&&next.LotteryInteraction)||next||{};
  document.getElementById('title').textContent=cfg.Title||'幸运抽奖';
  if(!cfg.LastPrize){return}
  if(cfg.DrawNonce===lastNonce){return}
  lastNonce=cfg.DrawNonce||0;
  var wheel=document.getElementById('wheel');
  wheel.style.transform='rotate('+(lastNonce*720+Math.floor(Math.random()*360))+'deg)';
  document.getElementById('empty').classList.add('hide');
  var winner=document.getElementById('winner'), prize=document.getElementById('prize');
  winner.textContent='恭喜 '+(cfg.LastWinner||'幸运观众')+' 抽中';
  prize.textContent=cfg.LastPrize;
  winner.classList.remove('hide'); prize.classList.remove('hide');
  clearTimeout(hideTimer);
  hideTimer=setTimeout(function(){
    winner.classList.add('hide'); prize.classList.add('hide');
    document.getElementById('empty').classList.remove('hide');
  }, Math.max(1,Number(cfg.StaySeconds||8))*1000);
}
function load(){fetch('/plugin-settings').then(function(r){return r.json()}).then(apply).catch(function(){})}
load();
var ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws');
ws.onmessage=function(ev){try{var data=JSON.parse(ev.data);if(data._plugin_settings_update)load()}catch(e){}};
</script>
</body>
</html>
