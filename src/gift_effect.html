<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;background:transparent;font-family:"PingFang SC","Microsoft YaHei","Noto Sans SC",sans-serif}
body{display:flex;align-items:flex-end;justify-content:center;padding-bottom:34px}
#stage{position:relative;width:360px;height:360px;opacity:0;transform:translateY(20px);transition:opacity .25s ease,transform .25s ease}
#stage.show{opacity:1;transform:translateY(0)}
.cup{position:absolute;left:50%;bottom:0;width:220px;height:190px;transform:translateX(-50%);border:4px solid rgba(55,65,81,.75);border-radius:18px 18px 38px 38px;background:linear-gradient(180deg,rgba(255,255,255,.68),rgba(219,234,254,.42));box-shadow:inset 0 -18px 30px rgba(59,130,246,.16),0 18px 38px rgba(15,23,42,.28)}
.rim{position:absolute;left:50%;bottom:172px;width:250px;height:22px;transform:translateX(-50%);border:3px solid rgba(55,65,81,.72);border-radius:999px;background:rgba(255,255,255,.72)}
.bubble{position:absolute;width:28px;height:28px;border-radius:999px;background:#fff;border:2px solid #f9a8d4;display:flex;align-items:center;justify-content:center;font-size:16px;animation:fall 1.15s ease-in forwards}
.cat{position:absolute;width:32px;height:32px;border-radius:999px;background:#67e8f9;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:900;animation:float 1.6s ease-in-out infinite}
.cat.left{left:18px;bottom:78px}.cat.right{right:18px;bottom:112px}
#caption{position:absolute;left:50%;bottom:10px;min-width:280px;transform:translateX(-50%);padding:8px 14px;border-radius:999px;background:rgba(88,28,135,.88);border:2px solid #a78bfa;color:#fef3c7;text-align:center;font-weight:900;text-shadow:0 1px 2px rgba(0,0,0,.5)}
@keyframes fall{0%{transform:translateY(-180px) rotate(0);opacity:0}15%{opacity:1}100%{transform:translateY(60px) rotate(300deg);opacity:1}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
</style>
</head>
<body>
<div id="stage">
  <div class="rim"></div>
  <div class="cup"></div>
  <div class="cat left">喵</div>
  <div class="cat right">喵</div>
  <div id="items"></div>
  <div id="caption"></div>
</div>
<script>
var cfg=null,lastNonce=0,hideTimer=null,audioCtx=null;
function localResource(path){return '/local-resource?url='+encodeURIComponent(path||'')}
function playSound(){
  if(!cfg||cfg.Sound==='mute')return;
  if(cfg.Sound==='custom'&&cfg.CustomSoundPath){try{var a=new Audio(localResource(cfg.CustomSoundPath));a.volume=Math.max(0,Math.min(1,Number(cfg.SoundVolume||60)/100));a.play();return}catch(e){}}
  try{audioCtx=audioCtx||new (window.AudioContext||window.webkitAudioContext)();var o=audioCtx.createOscillator(),g=audioCtx.createGain();o.type='triangle';o.frequency.value=720;g.gain.value=Math.max(0,Math.min(1,Number(cfg.SoundVolume||60)/100))*.16;o.connect(g);g.connect(audioCtx.destination);o.start();g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+.22);o.stop(audioCtx.currentTime+.24)}catch(e){}
}
function render(){
  var stage=document.getElementById('stage'),items=document.getElementById('items'),caption=document.getElementById('caption');
  items.innerHTML='';
  var count=Math.min(42,Math.max(10,Number(cfg.LastCount||10)*2));
  for(var i=0;i<count;i++){
    var b=document.createElement('div');
    b.className='bubble';
    b.textContent=i%3===0?'🐾':i%3===1?'🎁':'💗';
    b.style.left=(55+Math.random()*235)+'px';
    b.style.top=(10+Math.random()*90)+'px';
    b.style.animationDelay=(Math.random()*.55)+'s';
    items.appendChild(b);
  }
  caption.textContent=(cfg.LastUser||'观众')+' 送出 '+(cfg.LastGift||'礼物')+' x'+(cfg.LastCount||1);
  stage.classList.add('show');
  playSound();
  clearTimeout(hideTimer);
  hideTimer=setTimeout(function(){stage.classList.remove('show')},4200);
}
function apply(next){
  cfg=(next&&next.GiftEffect)||next||{};
  if(!cfg.Enabled)return;
  if(!cfg.EffectNonce||cfg.EffectNonce===lastNonce)return;
  lastNonce=cfg.EffectNonce;
  render();
}
function load(){fetch('/plugin-settings').then(function(r){return r.json()}).then(apply).catch(function(){})}
load();
var ws=new WebSocket((location.protocol==='https:'?'wss://':'ws://')+location.host+'/ws');
ws.onmessage=function(ev){try{var data=JSON.parse(ev.data);if(data._plugin_settings_update)load()}catch(e){}};
</script>
</body>
</html>
