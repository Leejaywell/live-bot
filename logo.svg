<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="64" y1="64" x2="448" y2="448" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E1B4B"/>
    </linearGradient>

    <linearGradient id="accent" x1="120" y1="120" x2="392" y2="392" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="32" y="32" width="448" height="448" rx="96" fill="url(#bg)"/>

  <!-- Chat bubble -->
  <path
    d="M148 156C148 134 166 116 188 116H324C346 116 364 134 364 156V276C364 298 346 316 324 316H270L224 362V316H188C166 316 148 298 148 276V156Z"
    stroke="url(#accent)"
    stroke-width="20"
    fill="none"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Robot head -->
  <rect
    x="176"
    y="148"
    width="160"
    height="132"
    rx="48"
    fill="#F8FAFC"
  />

  <!-- Face -->
  <rect
    x="196"
    y="168"
    width="120"
    height="92"
    rx="32"
    fill="#0F172A"
  />

  <!-- Eyes -->
  <rect x="222" y="196" width="18" height="38" rx="9" fill="#38BDF8"/>
  <rect x="272" y="196" width="18" height="38" rx="9" fill="#38BDF8"/>

  <!-- Smile -->
  <path
    d="M238 240C246 248 266 248 274 240"
    stroke="#38BDF8"
    stroke-width="8"
    stroke-linecap="round"
  />

  <!-- Antenna -->
  <line x1="256" y1="148" x2="256" y2="118" stroke="#E2E8F0" stroke-width="10"/>
  <circle cx="256" cy="104" r="14" fill="url(#accent)"/>

  <!-- Headset -->
  <path
    d="M180 210C180 184 200 164 226 164"
    stroke="#CBD5E1"
    stroke-width="12"
    stroke-linecap="round"
  />

  <path
    d="M332 210C332 184 312 164 286 164"
    stroke="#CBD5E1"
    stroke-width="12"
    stroke-linecap="round"
  />

  <!-- Microphone -->
  <path
    d="M330 238C350 238 360 252 360 266"
    stroke="#0F172A"
    stroke-width="10"
    stroke-linecap="round"
  />

  <circle cx="366" cy="270" r="10" fill="#0F172A"/>
</svg>