<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background gradient: deep navy to dark blue -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1520;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#0f1e35;stop-opacity:1"/>
    </linearGradient>

    <!-- Accent blue glow -->
    <radialGradient id="glowGrad" cx="50%" cy="48%" r="42%">
      <stop offset="0%" style="stop-color:#3b9aff;stop-opacity:0.22"/>
      <stop offset="100%" style="stop-color:#3b9aff;stop-opacity:0"/>
    </radialGradient>

    <!-- Bubble fill gradient -->
    <linearGradient id="bubbleFill" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1c3a6e;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#112850;stop-opacity:1"/>
    </linearGradient>

    <!-- Stroke gradient for bubble border -->
    <linearGradient id="bubbleStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60b4ff;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#2d8aff;stop-opacity:1"/>
    </linearGradient>

    <!-- Glow filter for the bubble outline -->
    <filter id="glowFilter" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Subtle shadow for depth -->
    <filter id="shadowFilter" x="-15%" y="-15%" width="130%" height="135%">
      <feDropShadow dx="0" dy="8" stdDeviation="18" flood-color="#0a1628" flood-opacity="0.7"/>
    </filter>

    <!-- Line glow -->
    <filter id="lineGlow" x="-30%" y="-80%" width="160%" height="260%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Clip for rounded square -->
    <clipPath id="roundedClip">
      <rect width="512" height="512" rx="108" ry="108"/>
    </clipPath>
  </defs>

  <!-- Rounded square background -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Ambient glow in center -->
  <ellipse cx="256" cy="240" rx="200" ry="180" fill="url(#glowGrad)"/>

  <!-- Main chat bubble (speech bubble shape) with shadow -->
  <g filter="url(#shadowFilter)">
    <path d="M 130 155
             Q 128 155 116 155
             Q 96 155 96 175
             L 96 320
             Q 96 340 116 340
             L 222 340
             L 222 378
             Q 222 390 232 384
             L 290 340
             L 396 340
             Q 416 340 416 320
             L 416 175
             Q 416 155 396 155
             Z"
          fill="url(#bubbleFill)"
          stroke="url(#bubbleStroke)"
          stroke-width="6"
          filter="url(#glowFilter)"/>
  </g>

  <!-- Danmu lines inside bubble -->
  <!-- Line 1 (top, shorter, bright) -->
  <g filter="url(#lineGlow)">
    <rect x="140" y="207" width="148" height="12" rx="6" fill="#60b4ff" opacity="0.95"/>
  </g>
  <!-- Line 2 (middle, full width, brightest) -->
  <g filter="url(#lineGlow)">
    <rect x="140" y="237" width="232" height="12" rx="6" fill="#82c8ff" opacity="1"/>
  </g>
  <!-- Line 3 (bottom, medium) -->
  <g filter="url(#lineGlow)">
    <rect x="140" y="267" width="188" height="12" rx="6" fill="#60b4ff" opacity="0.85"/>
  </g>
  <!-- Line 4 (bottom short, dimmer) -->
  <g filter="url(#lineGlow)">
    <rect x="140" y="297" width="108" height="12" rx="6" fill="#3b9aff" opacity="0.6"/>
  </g>

  <!-- Robot antenna on top of bubble -->
  <!-- Stem -->
  <rect x="249" y="108" width="14" height="54" rx="7" fill="#2d8aff" opacity="0.9"/>
  <!-- Antenna ball (glowing dot) -->
  <circle cx="256" cy="100" r="16" fill="#1a3e80"/>
  <circle cx="256" cy="100" r="16" fill="none" stroke="#60b4ff" stroke-width="4" filter="url(#glowFilter)"/>
  <circle cx="256" cy="100" r="7" fill="#82c8ff"/>
  <!-- Inner highlight -->
  <circle cx="252" cy="96" r="3" fill="white" opacity="0.5"/>

  <!-- Two small robot eyes near bottom of bubble -->
  <circle cx="218" cy="340" r="9" fill="#1a3e80" stroke="#3b9aff" stroke-width="2.5"/>
  <circle cx="218" cy="340" r="4" fill="#60b4ff"/>
  <circle cx="294" cy="340" r="9" fill="#1a3e80" stroke="#3b9aff" stroke-width="2.5"/>
  <circle cx="294" cy="340" r="4" fill="#60b4ff"/>

  <!-- Subtle corner accent dots -->
  <circle cx="148" cy="450" r="5" fill="#2d8aff" opacity="0.35"/>
  <circle cx="364" cy="450" r="5" fill="#2d8aff" opacity="0.35"/>
  <circle cx="256" cy="460" r="3.5" fill="#60b4ff" opacity="0.25"/>
</svg>
